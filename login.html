<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault | Login</title>

<link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="container">

<div class="card">

<h1>Money Vault</h1>
<p>Welcome Back</p>

<form id="loginForm">

<div class="inputBox">
<input
type="email"
id="email"
placeholder="Email"
required>
</div>

<div class="inputBox">
<input
type="password"
id="password"
placeholder="Password"
required>
</div>

<button type="submit">
Login
</button>

<div class="links">

<a href="register.html">
Create Account
</a>

<a href="#" id="forgotPassword">
Forgot Password?
</a>

</div>

</form>

</div>

</div>

<script type="module">

import {
loginUser,
resetPassword
} from "./js/auth.js";

const form =
document.getElementById("loginForm");

form.addEventListener("submit", async(e)=>{

e.preventDefault();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

await loginUser(email,password);

});

document
.getElementById("forgotPassword")
.addEventListener("click",async(e)=>{

e.preventDefault();

const email=
prompt("Enter your email");

if(email){

await resetPassword(email);

}

});

</script>

</body>
  </html>
