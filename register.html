<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Money Vault</title>

<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="container">

<div class="card">

<h2>Create Account</h2>
<p>Join Money Vault and start earning</p>

<form>

<div class="inputBox">
<input type="text" required>
<span>Full Name</span>
</div>

<div class="inputBox">
<input type="email" required>
<span>Email</span>
</div>

<div class="inputBox">
<input type="text" required>
<span>Phone Number</span>
</div>

<div class="inputBox">
<input type="password" required>
<span>Password</span>
</div>

<div class="inputBox">
<input type="password" required>
<span>Confirm Password</span>
</div>

<div class="inputBox">
<input type="text">
<span>Referral Code (Optional)</span>
</div>

<button type="submit">Register</button>

<div class="links">
<a href="login.html">Already have an account?</a>
<a href="index.html">Back Home</a>
</div>

</form>

</div>

<script type="module">
import { registerUser } from "./js/auth.js";

document.querySelector("form").addEventListener("submit", (e) => {
  e.preventDefault();

  const inputs = document.querySelectorAll("input");

  const name = inputs[0].value;
  const email = inputs[1].value;
  const phone = inputs[2].value;
  const password = inputs[3].value;
  const confirm = inputs[4].value;
  const referral = inputs[5].value;

  if (password !== confirm) {
    alert("Passwords do not match");
    return;
  }

  registerUser(email, password, name, phone, referral);
});
  </script>
  
</div>

</body>

  </html>
