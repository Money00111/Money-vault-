<!-- ===========================
MAIN
=========================== -->

<div class="main">

<header>

<button id="menuBtn">

<i class="fa fa-bars"></i>

</button>

<h2>Deposit Money</h2>

</header>

<!-- ===========================
PAYMENT METHODS
=========================== -->

<section class="payment-methods">

<h2>Payment Methods</h2>

<div class="payment-grid">

<div class="payment-card">

<h3>MTN Mobile Money</h3>

<h1 id="mtnNumber">

0788846187

</h1>

<button id="copyMTN">

Copy Number

</button>

</div>

<div class="payment-card">

<h3>Airtel Money</h3>

<h1 id="airtelNumber">

0722993296

</h1>

<button id="copyAirtel">

Copy Number

</button>

</div>

</div>

  </section>

  <!-- ===========================
DEPOSIT FORM
=========================== -->

<section class="deposit-form">

    <h2>💰 Submit Deposit</h2>

    <form id="depositForm">

        <div class="input-group">

            <label>Amount (RWF)</label>

            <input
                type="number"
                id="amount"
                placeholder="Enter amount"
                min="1000"
                required>

        </div>

        <div class="input-group">

            <label>Payment Method</label>

            <select
                id="paymentMethod"
                required>

                <option value="">
                    Select Payment Method
                </option>

                <option value="MTN Mobile Money">
                    MTN Mobile Money
                </option>

                <option value="Airtel Money">
                    Airtel Money
                </option>

            </select>

        </div>

        <div class="input-group">

            <label>Sender Phone Number</label>

            <input
                type="tel"
                id="senderPhone"
                placeholder="07XXXXXXXX"
                maxlength="10"
                required>

        </div>

        <div class="input-group">

            <label>Transaction ID</label>

            <input
                type="text"
                id="transactionId"
                placeholder="Example: PP240712ABC123"
                required>

        </div>

        <div class="input-group">

            <label>Date & Time of Payment</label>

            <input
                type="datetime-local"
                id="paymentDate"
                required>

        </div>

        <div class="input-group">

            <label>Additional Note (Optional)</label>

            <textarea
                id="note"
                rows="4"
                placeholder="Write any additional information here..."></textarea>

        </div>

        <button
            type="submit"
            id="submitBtn"
            class="submit-btn">

            <i class="fa-solid fa-paper-plane"></i>

            Submit Deposit Request

        </button>

    </form>

</section>

<!-- ===========================
CURRENT DEPOSIT STATUS
=========================== -->

<section class="deposit-status">

    <h2>📋 Current Deposit Status</h2>

    <div class="status-card pending">

        <h3>Status</h3>

        <p id="depositStatus">

            No Deposit Request

        </p>

    </div>

</section>
