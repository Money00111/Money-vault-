<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Login | Money Vault</title>

<link rel="stylesheet"
href="css/admin-login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Loading -->

<div
id="loadingScreen"
class="loading-screen">

<div class="loader"></div>

<h2>Loading Admin...</h2>

</div>

<!-- Login Container -->

<div class="login-container">

<!-- Logo -->

<div class="logo-box">

<div class="logo-circle">

<i class="fa-solid fa-shield-halved"></i>

</div>

<h1>Money Vault</h1>

<p>Administrator Panel</p>

</div>

<!-- Login Card -->

<div class="login-card">

<h2>

<i class="fa-solid fa-user-shield"></i>

Admin Login

</h2>

<form id="adminLoginForm">

<!-- Email -->

<div class="input-group">

<label>

Email Address

</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input

type="email"

id="adminEmail"

placeholder="Enter Admin Email"

required>

</div>

</div>

<!-- Password -->

<div class="input-group">

<label>

Password

</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input

type="password"

id="adminPassword"

placeholder="Enter Password"

required>

<button

type="button"

id="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<!-- Remember -->

<div class="remember-box">

<label>

<input
type="checkbox"
id="rememberMe">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<!-- Button -->

<button

type="submit"

id="loginBtn"

class="login-btn">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<!-- Error -->

<div

id="loginError"

class="login-error">

</div>

</div>

</div>

<script type="module"
src="js/admin-login.js"></script>

</body>

</html>
