<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:320px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h1,h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.login-btn{
    background:#3b82f6;
    color:white;
}

.deposit{
    background:#10b981;
    color:white;
}

.withdraw{
    background:#ef4444;
    color:white;
}

.logout{
    background:#334155;
    color:white;
}

.balance{
    text-align:center;
    font-size:24px;
    margin:20px 0;
    font-weight:bold;
}

.history{
    margin-top:20px;
    max-height:200px;
    overflow:auto;
}

.item{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="container" id="loginPage">

<h1>Money Vault</h1>

<input type="text" id="username" placeholder="Enter username">

<button class="login-btn" onclick="login()">
Login
</button>

</div>

<!-- DASHBOARD -->

<div class="container hidden" id="dashboard">

<h2 id="welcome"></h2>

<div class="balance">
$<span id="balance">0</span>
</div>

<input type="number" id="amount" placeholder="Enter amount">

<button class="deposit" onclick="depositMoney()">
Deposit
</button>

<button class="withdraw" onclick="withdrawMoney()">
Withdraw
</button>

<button class="logout" onclick="logout()">
Logout
</button>

<div class="history" id="history"></div>

</div>

<script>

let savedUser = localStorage.getItem("username");

let balance = localStorage.getItem("balance")
? parseFloat(localStorage.getItem("balance"))
: 0;

let transactions = localStorage.getItem("transactions")
? JSON.parse(localStorage.getItem("transactions"))
: [];

if(savedUser){
    showDashboard(savedUser);
}

function login(){

    let username = document.getElementById("username").value;

    if(username.trim() == ""){
        alert("Enter username");
        return;
    }

    localStorage.setItem("username", username);

    showDashboard(username);
}

function showDashboard(username){

    document.getElementById("loginPage").classList.add("hidden");

    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("welcome").innerText =
    "Welcome, " + username;

    updateUI();
}

function logout(){

    localStorage.removeItem("username");

    location.reload();
}

function saveData(){

    localStorage.setItem("balance", balance);

    localStorage.setItem("transactions",
    JSON.stringify(transactions));
}

function updateUI(){

    document.getElementById("balance").innerText = balance;

    let historyDiv =
    document.getElementById("history");

    historyDiv.innerHTML = "";

    transactions.slice().reverse().forEach(item => {

        historyDiv.innerHTML += `
        <div class="item">
        ${item}
        </div>
        `;
    });
}

function depositMoney(){

    let amount =
    parseFloat(document.getElementById("amount").value);

    if(!amount || amount <= 0){
        alert("Enter valid amount");
        return;
    }

    balance += amount;

    let time = new Date().toLocaleString();

    transactions.push(
    "Deposited $" + amount + "<br><small>" + time + "</small>"
    );

    saveData();

    updateUI();

    document.getElementById("amount").value = "";
}

function withdrawMoney(){

    let amount =
    parseFloat(document.getElementById("amount").value);

    if(!amount || amount <= 0){
        alert("Enter valid amount");
        return;
    }

    if(amount > balance){
        alert("Insufficient balance");
        return;
    }

    balance -= amount;

    let time = new Date().toLocaleString();

    transactions.push(
    "Withdrew $" + amount + "<br><small>" + time + "</small>"
    );

    saveData();

    updateUI();

    document.getElementById("amount").value = "";
}

</script>

</body>
</html>
