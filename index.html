```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault Savings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:360px;
background:#1e293b;
padding:20px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1,h2,h3{
text-align:center;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.login-btn{
background:#3b82f6;
color:white;
}

.deposit{
background:#10b981;
color:white;
}

.withdraw{
background:#ef4444;
color:white;
}

.grow{
background:#8b5cf6;
color:white;
}

.clear{
background:#f59e0b;
color:white;
}

.logout{
background:#334155;
color:white;
}

.balance{
text-align:center;
font-size:30px;
font-weight:bold;
margin:20px 0;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:15px;
text-align:center;
}

.card h3{
font-size:14px;
margin-bottom:8px;
}

.card p{
font-size:20px;
font-weight:bold;
}

.progress-box{
margin-top:20px;
}

.progress{
width:100%;
height:20px;
background:#334155;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
background:#10b981;
width:0%;
}

.history{
margin-top:20px;
max-height:180px;
overflow:auto;
}

.item{
background:#0f172a;
padding:12px;
border-radius:12px;
margin-top:10px;
font-size:14px;
}

.hidden{
display:none;
}

small{
color:gray;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="container" id="loginPage">

<h1>Money Vault Savings</h1>

<input type="text"
id="username"
placeholder="Enter username">

<button class="login-btn"
onclick="login()">
Login
</button>

</div>

<!-- DASHBOARD -->

<div class="container hidden"
id="dashboard">

<h2 id="welcome"></h2>

<div class="balance">
$<span id="balance">0</span>
</div>

<div class="stats">

<div class="card">
<h3>Savings Goal</h3>
<p id="goalDisplay">$0</p>
</div>

<div class="card">
<h3>Estimated Growth</h3>
<p id="growthDisplay">$0</p>
</div>

</div>

<input type="number"
id="goalInput"
placeholder="Set savings goal">

<button class="grow"
onclick="setGoal()">
Set Goal
</button>

<input type="number"
id="amount"
placeholder="Enter amount">

<button class="deposit"
onclick="depositMoney()">
Deposit
</button>

<button class="withdraw"
onclick="withdrawMoney()">
Withdraw
</button>

<button class="grow"
onclick="simulateGrowth()">
Simulate Growth
</button>

<button class="clear"
onclick="clearHistory()">
Clear History
</button>

<button class="logout"
onclick="logout()">
Logout
</button>

<div class="progress-box">

<h3>Goal Progress</h3>

<div class="progress">

<div class="progress-bar"
id="progressBar"></div>

</div>

</div>

<div class="history"
id="history"></div>

</div>

<script>

let savedUser =
localStorage.getItem("username");

let balance =
localStorage.getItem("balance")
? parseFloat(localStorage.getItem("balance"))
: 0;

let goal =
localStorage.getItem("goal")
? parseFloat(localStorage.getItem("goal"))
: 0;

let estimatedGrowth =
localStorage.getItem("estimatedGrowth")
? parseFloat(localStorage.getItem("estimatedGrowth"))
: 0;

let transactions =
localStorage.getItem("transactions")
? JSON.parse(localStorage.getItem("transactions"))
: [];

if(savedUser){
showDashboard(savedUser);
}

function login(){

let username =
document.getElementById("username").value;

if(username.trim() == ""){
alert("Enter username");
return;
}

localStorage.setItem("username", username);

showDashboard(username);
}

function showDashboard(username){

document.getElementById("loginPage")
.classList.add("hidden");

document.getElementById("dashboard")
.classList.remove("hidden");

document.getElementById("welcome")
.innerText =
"Welcome, " + username;

updateUI();
}

function logout(){

localStorage.removeItem("username");

location.reload();
}

function saveData(){

localStorage.setItem("balance", balance);

localStorage.setItem("goal", goal);

localStorage.setItem("estimatedGrowth",
estimatedGrowth);

localStorage.setItem("transactions",
JSON.stringify(transactions));
}

function updateUI(){

document.getElementById("balance")
.innerText = balance;

document.getElementById("goalDisplay")
.innerText = "$" + goal;

document.getElementById("growthDisplay")
.innerText = "$" + estimatedGrowth;

let historyDiv =
document.getElementById("history");

historyDiv.innerHTML = "";

transactions.slice().reverse()
.forEach(item => {

historyDiv.innerHTML += `
<div class="item">
${item}
</div>
`;
});

let progress =
goal > 0
? (balance / goal) * 100
: 0;

if(progress > 100){
progress = 100;
}

document.getElementById("progressBar")
.style.width = progress + "%";
}

function setGoal(){

let newGoal =
parseFloat(document.getElementById("goalInput").value);

if(!newGoal || newGoal <= 0){
alert("Enter valid goal");
return;
}

goal = newGoal;

saveData();

updateUI();

document.getElementById("goalInput").value = "";
}

function depositMoney(){

let amount =
parseFloat(document.getElementById("amount").value);

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

balance += amount;

let time =
new Date().toLocaleString();

transactions.push(
"Deposited $" + amount +
"<br><small>" + time + "</small>"
);

saveData();

updateUI();

document.getElementById("amount").value = "";
}

function withdrawMoney(){

let amount =
parseFloat(document.getElementById("amount").value);

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

if(amount > balance){
alert("Insufficient balance");
return;
}

balance -= amount;

let time =
new Date().toLocaleString();

transactions.push(
"Withdrew $" + amount +
"<br><small>" + time + "</small>"
);

saveData();

updateUI();

document.getElementById("amount").value = "";
}

function simulateGrowth(){

let growth =
balance * 0.05;

estimatedGrowth += growth;

let time =
new Date().toLocaleString();

transactions.push(
"Growth added $" +
growth.toFixed(2) +
"<br><small>" + time + "</small>"
);

saveData();

updateUI();
}

function clearHistory(){

transactions = [];

saveData();

updateUI();
}

</script>

</body>
</html>
```
