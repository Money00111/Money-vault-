class="deposit"

Deposit
</button>

class="withdraw"
onclick="withdrawMoney()">
Withdraw

<script>

let username =
localStorage.getItem("username")
|| "niyigenaepizo9";

let balance =
localStorage.getItem("balance")
? parseInt(localStorage.getItem("balance"))
: 0;

let deposits =
localStorage.getItem("deposits")
? parseInt(localStorage.getItem("deposits"))
: 0;

let profits =
localStorage.getItem("profits")
? parseInt(localStorage.getItem("profits"))
: 0;

let history =
localStorage.getItem("history")
? JSON.parse(localStorage.getItem("history"))
: [];

document.getElementById("welcomeText")
.innerHTML =
"Hello, " + username + " 👋";

document.getElementById("profileLetter")
.innerText =
username.charAt(0).toLowerCase();

function saveData(){

localStorage.setItem("balance", balance);

localStorage.setItem("deposits", deposits);

localStorage.setItem("profits", profits);

localStorage.setItem("history",
JSON.stringify(history));
}

function updateUI(){

document.getElementById("balance")
.innerText =
balance.toLocaleString() + " RWF";

document.getElementById("deposits")
.innerText =
deposits.toLocaleString() + " RWF";

document.getElementById("profits")
.innerText =
profits.toLocaleString() + " RWF";

let historyList =
document.getElementById("historyList");

historyList.innerHTML = "";

history.slice().reverse().forEach(item=>{

historyList.innerHTML += `
<div class="item">
${item}
</div>
`;

});

}

function depositMoney(){

let amount =
parseInt(document.getElementById("amount").value);

if(!amount || amount <= 0){

alert("Enter valid amount");

return;
}

balance += amount;

deposits += amount;

profits += Math.floor(amount * 0.25);

let time =
new Date().toLocaleString();

history.push(
"Deposited " +
amount.toLocaleString() +
" RWF<br><small>" +
time +
"</small>"
);

saveData();

updateUI();

document.getElementById("amount").value="";
}

function withdrawMoney(){

let amount =
parseInt(document.getElementById("amount").value);

if(!amount || amount <= 0){

alert("Enter valid amount");

return;
}

if(amount > balance){

alert("Insufficient Balance");

return;
}

balance -= amount;

let time =
new Date().toLocaleString();

history.push(
"Withdraw " +
amount.toLocaleString() +
" RWF<br><small>" +
time +
"</small>"
);

saveData();

updateUI();

document.getElementById("amount").value="";
}

updateUI();

</script>
