<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

<div class="logo">
💰
</div>

<h1>Money Vault</h1>

<p class="subtitle">
Secure Savings & Finance Platform
</p>

<div class="tabs">
<button id="loginTab" class="active">
Login
</button>

<button id="registerTab">
Register
</button>
</div>

<!-- LOGIN FORM -->

<div id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="Email Address">

<input
type="password"
id="loginPassword"
placeholder="Password">

<button
class="main-btn"
id="loginBtn">
Login
</button>

</div>

<!-- REGISTER FORM -->

<div id="registerForm" class="hidden">

<input
type="text"
id="registerName"
placeholder="Full Name">

<input
type="email"
id="registerEmail"
placeholder="Email Address">

<input
type="password"
id="registerPassword"
placeholder="Password">

<button
class="main-btn"
id="registerBtn">
Create Account
</button>

</div>

<p id="message"></p>

</div>

<script src="app.js" type="module"></script>

</body>
</html>
