<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/vip.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>💰 Money Vault</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="deposit.html">Deposit</a>
  <a href="withdraw.html">Withdraw</a>
  <a href="vip.html">VIP</a>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<header>
  <button id="menuBtn"><i class="fa fa-bars"></i></button>
  <h2>Dashboard</h2>
</header>

<section class="welcome">
  <h3>Welcome 👋</h3>
  <p id="username">Loading...</p>
</section>

<!-- BALANCE -->
<section class="wallet-card">
  <h1 id="balanceBox">0 RWF</h1>
  <p id="vipStatus">Inactive</p>
</section>

<!-- VIP PLANS -->
<section class="vip-section">

  <h2>VIP Plans</h2>

  <div class="vip-grid">

    <div class="vip-card vip1" onclick="buyVIP('VIP 1')">
      <h3>VIP 1</h3>
      <p>10,000 RWF</p>
      <span>+500 / day</span>
    </div>

    <div class="vip-card vip2" onclick="buyVIP('VIP 2')">
      <h3>VIP 2</h3>
      <p>25,000 RWF</p>
      <span>+1500 / day</span>
    </div>

    <div class="vip-card vip3" onclick="buyVIP('VIP 3')">
      <h3>VIP 3</h3>
      <p>50,000 RWF</p>
      <span>+3500 / day</span>
    </div>

    <div class="vip-card vip4" onclick="buyVIP('VIP 4')">
      <h3>VIP 4</h3>
      <p>100,000 RWF</p>
      <span>+8000 / day</span>
    </div>

  </div>

  </section>

<!-- STATS -->
<section>
  <p>Deposit: <span id="depositTotal">0</span></p>
  <p>Withdraw: <span id="withdrawTotal">0</span></p>
  <p>Referral: <span id="refBonus">0</span></p>
  <p>Earnings: <span id="earningsBox">0</span></p>
</section>

<!-- NOTIFICATIONS -->
<div id="notificationList"></div>

</div>

<script type="module" src="js/dashboard.js"></script>
</body>
  </html>
