<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault - Dashboard</title>
<style>
body{ margin:0; font-family:Segoe UI, sans-serif; background:#f9fafb; padding-bottom:80px; }

/* SIDEBAR */
.sidebar{ 
  position:fixed; top:0; left:-280px; width:280px; height:100%; 
  background:#fff; box-shadow:2px 0 15px rgba(0,0,0,.2); 
  transition:.3s; z-index:1001; padding:20px; 
}
.sidebar.active{ left:0; }
.sidebar h2{ color:#16a34a; margin-bottom:20px; }
.sidebar a{ display:block; padding:14px 10px; text-decoration:none; color:#222; font-size:17px; border-radius:10px; }
.sidebar a:hover, .sidebar a.active{ background:#dcfce7; color:#16a34a; }
.logout{ color:red !important; margin-top:25px; }
.close-btn{ font-size:30px; cursor:pointer; text-align:right; margin-bottom:10px; }
.menu-btn{ font-size:32px; cursor:pointer; margin:15px; color:#16a34a; }

/* OVERLAY */
.overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.4); display:none; z-index:1000; }
.overlay.active{ display:block; }

/* BOTTOM NAV */
.bottom-nav{
  position:fixed; bottom:0; left:0; width:100%;
  background:#fff; display:flex; justify-content:space-around;
  padding:10px 0; box-shadow:0 -2px 15px rgba(0,0,0,.1);
  border-top-left-radius:20px; border-top-right-radius:20px; z-index:999;
}
.bottom-nav a{ flex:1; text-align:center; text-decoration:none; color:#6b7280; font-size:12px; }
.bottom-nav a span{ display:block; margin-top:4px; }
.bottom-nav a.active{ color:#16a34a; transform:translateY(-3px); }

/* CONTENT */
.content{ padding:20px; }
.content h1{ color:#16a34a; }
.card{ background:#fff; padding:20px; border-radius:15px; margin-top:15px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="close-btn" onclick="toggleSidebar()">✕</div>
  <h2>Money Vault</h2>
  <a href="#" class="active" onclick="setActive(this)">🏠 Dashboard</a>
  <a href="#" onclick="setActive(this)">💼 My Wallet</a>
  <a href="#" onclick="setActive(this)">⬇️ Deposit</a>
  <a href="#" onclick="setActive(this)">⬆️ Withdraw</a>
  <a href="#" onclick="setActive(this)">👑 VIP Plans</a>
  <a href="#" onclick="setActive(this)">📋 Transactions</a>
  <a href="#" onclick="setActive(this)">👥 Referrals</a>
  <a href="#" onclick="setActive(this)">👤 Profile</a>
  <a href="#" onclick="setActive(this)">⚙️ Settings</a>
  <a href="#" class="logout" onclick="setActive(this)">🚪 Logout</a>
</div>

<!-- MENU BUTTON -->
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- CONTENT -->
<div class="content">
  <h1>Murakaza neza 👋</h1>
  <div class="card">
    <h3>Balance yawe</h3>
    <h2>0 RWF</h2>
  </div>
  <div class="card">
    <h3>Transactions z'ubu</h3>
    <p>Nta transaction iraba.</p>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="#" class="active" onclick="setActive(this)">🏠<span>Home</span></a>
  <a href="#" onclick="setActive(this)">⬇️<span>Deposit</span></a>
  <a href="#" onclick="setActive(this)">💼<span>Wallet</span></a>
  <a href="#" onclick="setActive(this)">⬆️<span>Withdraw</span></a>
  <a href="#" onclick="setActive(this)">👤<span>Profile</span></a>
</nav>

<script>
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
  document.querySelector(".overlay").classList.toggle("active");
}

function setActive(el){
  document.querySelectorAll('.sidebar a, .bottom-nav a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  // Funga sidebar iyo ukoze kuri link
  if(window.innerWidth < 768) toggleSidebar();
}
</script>

</body>
</html>
