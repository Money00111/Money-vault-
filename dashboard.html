<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Money Vault</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #111827;
      position: fixed;
      top: 0;
      left: 0;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #60a5fa;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
      margin: 5px 0;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: #1f2937;
    }

    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .balance {
      font-size: 28px;
      color: #22c55e;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .deposit {
      background: #16a34a;
      color: white;
    }

    .withdraw {
      background: #f59e0b;
      color: white;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Money Vault</h2>

    <a href="#">Dashboard</a>
    <a href="deposit.html">Deposit</a>
    <a href="withdraw.html">Withdraw</a>
    <a href="transactions.html">Transactions</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="card">
      <h3>Welcome 👋</h3>
      <p id="userEmail">Loading...</p>
    </div>

    <div class="card">
      <h3>Your Balance</h3>
      <div class="balance" id="balance">0 RWF</div>
    </div>

    <div class="card">
      <h3>Quick Actions</h3>

      <button class="deposit" onclick="goDeposit()">Deposit</button>
      <button class="withdraw" onclick="goWithdraw()">Withdraw</button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

    // Check login
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        document.getElementById("userEmail").innerText = user.email;

        // Load user data
        const snap = await get(ref(db, "users/" + user.uid));

        if (snap.exists()) {
          const data = snap.val();
          document.getElementById("balance").innerText = data.balance + " RWF";
        }
      }
    });

    // Logout
    window.logout = async function () {
      await signOut(auth);
      window.location.href = "login.html";
    };

    // Navigation
    window.goDeposit = function () {
      window.location.href = "deposit.html";
    };

    window.goWithdraw = function () {
      window.location.href = "withdraw.html";
    };
  </script>

</body>
  </html>
