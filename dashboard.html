<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Vault Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="Dashboard.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="logo-box">
    <h2>💰 Money Vault</h2>
    <small>Smart Investment</small>
  </div>

  <a href="#" onclick="showPage('home')">📊 Dashboard</a>
  <a href="#" onclick="showPage('wallet')">💼 My Wallet</a>
  <a href="#" onclick="showPage('deposit')">⬇ Deposit</a>
  <a href="#" onclick="showPage('withdraw')">⬆ Withdraw</a>
  <a href="#" onclick="showPage('profile')">👤 Profile</a>
  <a href="#" onclick="showPage('settings')">⚙ Settings</a>

</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="top-right">
    <div class="notification">🔔 <span>2</span></div>
    <div class="avatar">M</div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="homePage">

  <div class="welcome-card">
    <h2 id="welcomeUser">Hello, User 👋</h2>
    <p>Smart Investment, Daily Earnings</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h4>Balance</h4>
      <h2 id="balanceValue">0</h2>
      <span>RWF</span>
    </div>
  </div>

</div>

<!-- WALLET -->
<div id="walletPage" style="display:none;">
  <div class="wallet-card">
    <h2>💼 My Wallet</h2>
    <h1 id="balanceValue">0 RWF</h1>
  </div>
</div>

<!-- DEPOSIT PAGE -->
<div id="depositPage" style="display:none;">
  <div class="wallet-card">

    <h2>⬇ Deposit Funds</h2>

    <input type="number" id="depositAmount" placeholder="Enter amount">

    <button class="deposit-btn" onclick="deposit()">
      Deposit
    </button>

  </div>
</div>

<!-- WITHDRAW PAGE -->
<div id="withdrawPage" style="display:none;">
  <div class="wallet-card">

    <h2>⬆ Withdraw Funds</h2>

    <input type="number" id="withdrawAmount" placeholder="Enter amount">

    <button class="withdraw-btn" onclick="withdraw()">
      Withdraw
    </button>

  </div>
</div>

<!-- PROFILE -->
<div id="profilePage" style="display:none;">
  <div class="wallet-card">
    <h2>👤 Profile</h2>
    <p>Name: <span id="profileName">User</span></p>
  </div>
</div>

<!-- SETTINGS -->
<div id="settingsPage" style="display:none;">
  <div class="wallet-card">
    <h2>⚙ Settings</h2>
    <p>Version: Money Vault 1.0</p>
  </div>
</div>

<!-- JS -->
<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function hideAllPages(){
  const pages = ["homePage","walletPage","depositPage","withdrawPage","profilePage","settingsPage"];

  pages.forEach(p => {
    document.getElementById(p).style.display = "none";
  });
}

function showPage(page){
  hideAllPages();
  document.getElementById(page + "Page").style.display = "block";
}
</script>

<script type="module" src="./dashboard.js"></script>

</body>
  </html>
